- name: Personal Development Environment
  hosts: localhost
  gather_facts: true
  any_errors_fatal: true
  vars:
    in_docker: false
    ansible_become_pass: "{{ lookup('env', 'ANSIBLE_BECOME_PASSWORD') }}"
  roles:
    - role: apt
      tags: linux

    # - role: github
    #   tags: linux

    - role: brew
      tags:
        - darwin
        - linux

    # - role: opt
    #   tags:
    #     - linux
    #     - darwin
    #
    - role: cmd
      tags:
        - linux
        - darwin

    - role: pip
      tags:
        - linux
        - darwin
