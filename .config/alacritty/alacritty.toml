[general]
live_config_reload = true

[font]
normal = { family = "MonoLisa Nerd Font", style = "Regular" }
bold = { family = "MonoLisa Nerd Font", style = "Bold" }
italic = { family = "MonoLisa Nerd Font", style = "Italic" }
size = 16

[window]
startup_mode = "Maximized"
title = "Terminal"
dynamic_title = true

[colors]
[colors.primary]
background = '#1d2021'
foreground = '#d4be98'

[colors.normal]
black   = '#32302f'
red     = '#ea6962'
green   = '#a9b665'
yellow  = '#d8a657'
blue    = '#7daea3'
magenta = '#d3869b'
cyan    = '#89b482'
white   = '#d4be98'

[colors.bright]
black   = '#32302f'
red     = '#ea6962'
green   = '#a9b665'
yellow  = '#d8a657'
blue    = '#7daea3'
magenta = '#d3869b'
cyan    = '#89b482'
white   = '#d4be98'

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Underline", blinking = "On" }

