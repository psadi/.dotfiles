[general]
live_config_reload = true

[font]
normal = { family = "MonoLisa Nerd Font", style = "Regular" }
bold = { family = "MonoLisa Nerd Font", style = "Bold" }
italic = { family = "MonoLisa Nerd Font", style = "Italic" }
size = 16

[window]
startup_mode = "Maximized"
title = "Terminal"
dynamic_title = true

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Underline", blinking = "On" }

